name: Lumi Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Quellcode auschecken
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: .NET 8 einrichten
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Version aus Git-Tag lesen
        id: version
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}" -replace '^v', ''
          if ($version -notmatch '^\d+\.\d+\.\d+$') {
            throw "Ungültiger Release-Tag: ${{ github.ref_name }}"
          }
          "number=$version" >> $env:GITHUB_OUTPUT

      - name: Lumi veröffentlichen
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.number }}"
          dotnet publish src/Lumi.csproj `
            --configuration Release `
            --runtime win-x64 `
            --self-contained true `
            --output artifacts/publish `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -p:DebugType=None `
            -p:DebugSymbols=false `
            -p:Version=$version `
            -p:AssemblyVersion="$version.0" `
            -p:FileVersion="$version.0" `
            -p:InformationalVersion=$version

          New-Item -ItemType Directory -Force -Path artifacts/release | Out-Null
          Copy-Item artifacts/publish/Lumi.exe "artifacts/release/Lumi-$version.exe"
          Compress-Archive `
            -Path artifacts/publish/* `
            -DestinationPath "artifacts/release/Lumi-Portable-$version.zip"

      - name: GitHub-Release mit Begleittext erstellen
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $version = "${{ steps.version.outputs.number }}"
          $assets = Get-ChildItem -Path artifacts/release -File |
            Select-Object -ExpandProperty FullName
          gh release create "${{ github.ref_name }}" `
            @assets `
            --verify-tag `
            --title "Lumi $version" `
            --generate-notes
